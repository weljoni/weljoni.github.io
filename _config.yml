# ===============================
#   Site Settings
# ===============================
text_skin: orange
highlight_theme: tomorrow-night
url: "https://weljoni.github.io"  # 你的 GitHub Pages 地址
baseurl: ""  # 为空，因为仓库名是 weljoni.github.io
title: "weljoni's blog"
description: >
  网络安全、开发与技术分享。

# ===============================
#   Language & Timezone
# ===============================
lang: zh-CN
#timezone: Asia/Shanghai

# ===============================
#   Author & Social
# ===============================
author:
  type: person
  name: Weljoni
  avatar: /assets/images/avatar.jpg  # 你可以自己放一张图片
  bio: 专注网络安全与技术分享
  email: weljoni@163.com
  github: weljoni
  # QQ 没有直接内置，我放到 bio，或后面自定义
  # 如果想放 QQ 图标，可以在页脚自定义添加

# ===============================
#   GitHub Repository
# ===============================
repository: weljoni/weljoni.github.io
repository_tree: master

# ===============================
#   Paths
# ===============================
paths:
  root: /
  home: /
  archive: /archive.html
  rss: /feed.xml

# ===============================
#   Post
# ===============================
excerpt_separator: <!--more-->
license: CC-BY-NC-4.0

toc:
  selectors: "h1,h2,h3"

# ===============================
#   Markdown Enhancements
# ===============================
mathjax: false
mermaid: false
chart: false

# ===============================
#   Paginate
# ===============================
paginate: 8
paginate_path: /page:num

# ===============================
#   Sharing (默认关闭)
# ===============================
sharing:
  provider: false

# ===============================
#   Comments (Valine)
# ===============================
comments:
  provider: valine
  valine:
    app_id: grcH8K3bGcaPw2Trvmis31bW-gzGzoHsz
    app_key: nGsyBzwCvoTJAtwLqeyZ15XG
    placeholder: 欢迎留言交流~
    visitor: true
    meta: "[nick, mail, link]"

# ===============================
#   Pageview (Busuanzi)
# ===============================
pageview:
  provider: custom  # 用自定义方式添加
  # 在 layouts/article.html 添加 Busuanzi 脚本，下面我给你第二步做

# ===============================
#   Search
# ===============================
search:
  provider: default

# ===============================
#   Analytics (默认关闭)
# ===============================
analytics:
  provider: false

# ===============================
#   Build
# ===============================
markdown: kramdown
highlighter: rouge
permalink: date

exclude:
  - CHANGELOG.md
  - HOW_TO_RELEASE.md
  - Gemfile
  - Gemfile.lock
  - LICENSE
  - README-*.md
  - README.md
  - gulpfile.js
  - jekyll-text-theme.gemspec
  - package-lock.json
  - package.json
  - /docs
  - /node_modules
  - /screenshots
  - /test
  - /vendor

defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: article
      sharing: true
      license: true
      aside:
        toc: true
      show_edit_on_github: true
      show_subscribe: true
      pageview: true

plugins:
  - jekyll-feed
  - jekyll-paginate
  - jekyll-sitemap
  - jemoji
